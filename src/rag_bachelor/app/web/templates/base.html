<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 Assistant Révision</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">🎓 Assistant Révision</div>
    <div class="sidebar-caption">Révise tes cours avec l'IA locale — Ollama.</div>

    <div class="provider-badge">
      <span>{{ provider_icon }}</span>
      <span>{{ provider_label }}</span>
    </div>

    <hr class="sidebar-divider">

    <nav class="nav">
      <a href="/docs"     class="nav-link {% if active_tab == 'docs'     %}active{% endif %}">📚 Documentation</a>
      <a href="/ask"      class="nav-link {% if active_tab == 'ask'      %}active{% endif %}">❓ Poser une question</a>
      <a href="/revision" class="nav-link {% if active_tab == 'revision' %}active{% endif %}">🔄 Révision</a>
      <a href="/generate" class="nav-link {% if active_tab == 'generate' %}active{% endif %}">🎯 Générer des questions</a>
      <a href="/progress" class="nav-link {% if active_tab == 'progress' %}active{% endif %}">📊 Progrès</a>
      <a href="/settings" class="nav-link {% if active_tab == 'settings' %}active{% endif %}">⚙️ Paramètres</a>
    </nav>
  </aside>

  <!-- ── Main content ─────────────────────────────────────────────────── -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
